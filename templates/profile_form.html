<!DOCTYPE html>
<html>
<head>
    <title>Create Profile</title>
    <style>
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: .5rem;
        }
    </style>
</head>
<body>
    <h1>Create Your Profile</h1>
    <form action="{{ url_for('generate_profile') }}" method="POST">
        <input type="hidden" name="template" value="{{ template }}">
        
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" required>
        </div>
        
        <div class="form-group">
            <label for="blood_group">Blood Group:</label>
            <select id="blood_group" name="blood_group" required>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select>
        </div>

        <div class="form-group">
            <label for="password">Password (for viewing sensitive info):</label>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div class="form-group">
            <label for="emergency_contact">Emergency Contact:</label>
            <input type="text" id="emergency_contact" name="emergency_contact">
        </div>
        
        <div class="form-group">
            <label for="medical_conditions">Medical Conditions:</label>
            <textarea id="medical_conditions" name="medical_conditions"></textarea>
        </div>
        
        <div class="form-group">
            <label for="allergies">Allergies:</label>
            <textarea id="allergies" name="allergies"></textarea>
        </div>
        
        <div class="form-group">
            <label for="medications">Current Medications:</label>
            <textarea id="medications" name="medications"></textarea>
        </div>
        
        <button type="submit">Generate QR Code</button>
    </form>
</body>
</html>
