<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile</title>
    <style>
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            display: block;
            margin-bottom: .5rem;
        }
    </style>
</head>
<body>
    <h1>Edit Profile</h1>
    <form action="{{ url_for('edit_profile', profile_id=profile.id) }}" method="POST">
        <input type="hidden" name="password" value="{{ profile.password }}">
        
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" value="{{ profile.name }}" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone" value="{{ profile.phone }}" required>
        </div>
        
        <div class="form-group">
            <label for="blood_group">Blood Group:</label>
            <select id="blood_group" name="blood_group" required>
                {% for bg in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                    <option value="{{ bg }}" {% if bg == profile.blood_group %}selected{% endif %}>{{ bg }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="emergency_contact">Emergency Contact:</label>
            <input type="text" id="emergency_contact" name="emergency_contact" value="{{ profile.emergency_contact }}">
        </div>
        
        <div class="form-group">
            <label for="medical_conditions">Medical Conditions:</label>
            <textarea id="medical_conditions" name="medical_conditions">{{ profile.medical_conditions }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="allergies">Allergies:</label>
            <textarea id="allergies" name="allergies">{{ profile.allergies }}</textarea>
        </div>
        
        <div class="form-group">
            <label for="medications">Current Medications:</label>
            <textarea id="medications" name="medications">{{ profile.medications }}</textarea>
        </div>
        
        <button type="submit">Update Profile</button>
    </form>
</body>
</html>
